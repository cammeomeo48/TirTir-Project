

services:
  # ─── Redis Cache ────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FastAPI AI Microservice ─────────────────────────
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:-}
    volumes:
      - ./ai-service:/app # Hot-reload Python files
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s # Give model time to load on first startup

  # ─── FastAPI Chatbot Microservice ────────────────────────
  chatbot:
    build: ./backend/chatbot
    ports:
      - "8001:8001"
    environment:
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:-}
    volumes:
      - ./backend/chatbot:/app # Hot-reload Python files
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s # Give model time to load on first startup

  # ─── Node.js Backend ────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Override service URLs to use Docker internal network names
      - AI_SERVICE_URL=http://ai-service:8000
      - CHATBOT_SERVICE_URL=http://chatbot:8001
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:-}
    volumes:
      - ./backend:/app # Hot-reload Node files
      - /app/node_modules # Prevent host node_modules from overwriting container's
      - backend_logs:/app/logs # Named volume: isolate logs from Windows FS (prevents EACCES)
      - backend_uploads:/app/uploads
      - ./frontend/tirtir-frontend/public/assets:/frontend/tirtir-frontend/public/assets
    depends_on:
      - ai-service
      - chatbot
      - redis
    restart: unless-stopped
  # ─── Frontend: Chạy NGOÀI Docker (ng serve) ────────
  # Angular dev server chạy native cho performance tốt hơn.
  # Nếu cần build prod, dùng Nginx Alpine:
  #
  # frontend:
  #   build: ./frontend/tirtir-frontend
  #   ports:
  #     - "4200:80"
  #   depends_on:
  #     - backend

  # ─── Named Volumes ───────────────────────────────────
  # Isolate logs/ and uploads/ from Windows host mount to avoid EACCES
  # (non-root Docker user can't create dirs on WSL2-bridged Windows FS)
volumes:
  backend_logs:
  backend_uploads:
