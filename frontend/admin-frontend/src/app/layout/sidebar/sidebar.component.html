<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo-area">
            <div class="logo-icon">T</div>
            <h2 class="sidebar-title">TirTir Admin</h2>
        </div>
    </div>

    <div class="sidebar-content">
        @for (group of menuGroups; track group.title) {
        <div class="menu-group">
            <div class="group-title" *ngIf="group.title !== 'GENERAL'">{{ group.title }}</div>

            <nav class="group-nav">
                @for (item of group.items; track item.label) {
                <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [title]="item.label">
                    <span class="nav-label">{{ item.label }}</span>

                    @if (item.badge) {
                    <span class="nav-badge" [style.background-color]="item.badgeColor">{{ item.badge }}</span>
                    }
                </a>
                }
            </nav>
        </div>
        }
    </div>
</aside>
