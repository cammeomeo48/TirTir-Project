<aside class="sidebar" [class.collapsed]="collapsed">
    <div class="sidebar-header">
        <div class="logo-area">
            <div class="logo-icon">T</div>
            <h2 class="sidebar-title" *ngIf="!collapsed">TirTir Admin</h2>
        </div>
        <button class="collapse-btn" (click)="toggleCollapse()">
            <span class="icon">☰</span>
        </button>
    </div>

    <div class="sidebar-content">
        @for (group of menuGroups; track group.title) {
        <div class="menu-group">
            <div class="group-title" *ngIf="!collapsed">{{ group.title }}</div>

            <nav class="group-nav">
                @for (item of group.items; track item.label) {
                <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [title]="item.label">
                    <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>

                    @if (item.badge && !collapsed) {
                    <span class="nav-badge" [style.background-color]="item.badgeColor">{{ item.badge }}</span>
                    }
                </a>
                }
            </nav>
        </div>
        }
    </div>

    <div class="sidebar-footer">
        <a href="#" class="nav-item logout">
            <span class="nav-label" *ngIf="!collapsed">Logout</span>
        </a>
    </div>
</aside>
