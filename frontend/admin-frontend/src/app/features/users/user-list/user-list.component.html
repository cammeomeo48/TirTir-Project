<div class="page-header">
  <h2>Admin User Management</h2>
  <a routerLink="/users/add" class="btn btn-primary">Add New Staff</a>
</div>

<div class="content-card">
  <div *ngIf="loading" class="loading-spinner">Loading...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <table class="data-table" *ngIf="!loading && !error">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Created At</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span class="badge" [ngClass]="user.role">{{ user.role }}</span>
        </td>
        <td>{{ user.createdAt | date }}</td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="deleteUser(user._id)" title="Delete User">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
