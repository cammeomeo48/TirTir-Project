<div class="coupon-form-container">
    <div class="page-header">
        <div class="header-left">
            <a [routerLink]="['/coupons']" class="back-link">← Back to Coupons</a>
            <h1>{{ isEditMode ? 'Edit Coupon' : 'Create Coupon' }}</h1>
        </div>
    </div>

    <div class="form-card">
        <form [formGroup]="couponForm" (ngSubmit)="onSubmit()">
            <!-- Code & Status -->
            <div class="form-row">
                <div class="form-group">
                    <label>Coupon Code <span class="required">*</span></label>
                    <input type="text" formControlName="code"
                        [class.error]="couponForm.get('code')?.invalid && couponForm.get('code')?.touched"
                        placeholder="e.g. SUMMER2024">
                    <div class="error-msg"
                        *ngIf="couponForm.get('code')?.errors?.['required'] && couponForm.get('code')?.touched">
                        Coupon code is required
                    </div>
                    <div class="error-msg"
                        *ngIf="couponForm.get('code')?.errors?.['pattern'] && couponForm.get('code')?.touched">
                        Only letters, numbers, hyphens and underscores allowed
                    </div>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select formControlName="active">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
            </div>

            <!-- Discount Settings -->
            <div class="form-row">
                <div class="form-group">
                    <label>Discount Type</label>
                    <select formControlName="discountType">
                        <option value="percentage">Percentage (%)</option>
                        <option value="fixed">Fixed Amount ($)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Discount Value <span class="required">*</span></label>
                    <input type="number" formControlName="discountValue"
                        [class.error]="couponForm.get('discountValue')?.invalid && couponForm.get('discountValue')?.touched"
                        min="0.01" step="0.01">
                    <div class="error-msg"
                        *ngIf="couponForm.get('discountValue')?.errors?.['required'] && couponForm.get('discountValue')?.touched">
                        Discount value is required
                    </div>
                    <div class="error-msg"
                        *ngIf="couponForm.get('discountValue')?.errors?.['min'] && couponForm.get('discountValue')?.touched">
                        Must be greater than 0
                    </div>
                </div>
            </div>

            <!-- Dates -->
            <div class="form-row">
                <div class="form-group">
                    <label>Valid From <span class="required">*</span></label>
                    <input type="date" formControlName="validFrom"
                        [class.error]="couponForm.get('validFrom')?.invalid && couponForm.get('validFrom')?.touched">
                </div>

                <div class="form-group">
                    <label>Valid To <span class="required">*</span></label>
                    <input type="date" formControlName="validTo"
                        [class.error]="couponForm.get('validTo')?.invalid && couponForm.get('validTo')?.touched">
                </div>
            </div>

            <!-- Restrictions -->
            <div class="section-title">Restrictions & Limits</div>

            <div class="form-row">
                <div class="form-group">
                    <label>Min Order Amount ($)</label>
                    <input type="number" formControlName="minOrderValue" min="0" placeholder="0">
                </div>

                <div class="form-group">
                    <label>Usage Limit</label>
                    <input type="number" formControlName="usageLimit" min="1" placeholder="Unlimited">
                </div>
            </div>

            <div class="form-group" *ngIf="couponForm.get('discountType')?.value === 'percentage'">
                <label>Max Discount Amount ($)</label>
                <input type="number" formControlName="maxDiscount" min="0" placeholder="Unlimited">
                <p class="help-text">Optional cap for percentage discounts</p>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <button type="button" class="cancel-btn" [routerLink]="['/coupons']">Cancel</button>
                <button type="submit" class="submit-btn" [disabled]="submitting">
                    {{ submitting ? 'Saving...' : (isEditMode ? 'Update Coupon' : 'Create Coupon') }}
                </button>
            </div>

            <div class="error-message" *ngIf="error">
                {{ error }}
            </div>
        </form>
    </div>
</div>
