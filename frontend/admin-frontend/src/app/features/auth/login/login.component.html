<div class="login-container">

    <!-- Left: Brand Panel -->
    <div class="login-brand">
        <div class="brand-logo">
            <div class="brand-icon">T</div>
            <span class="brand-name">TirTir Admin</span>
        </div>

        <div class="brand-tagline">
            <h2>Manage your<br><span class="brand-accent">beauty brand</span><br>with clarity.</h2>
            <p>All your products, orders, customers and analytics — in one place.</p>
        </div>

        <div class="brand-footer">© 2026 TirTir Inc. All rights reserved.</div>
    </div>

    <!-- Right: Form Panel -->
    <div class="login-form-panel">
        <div class="login-card">
            <div class="login-header">
                <h1>Sign in</h1>
                <p>Enter your credentials to access the dashboard</p>
            </div>

            <form (ngSubmit)="onSubmit()" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" [(ngModel)]="email" required
                        placeholder="admin@tirtir.com" [disabled]="isLoading" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" [(ngModel)]="password" required
                        placeholder="Enter your password" [disabled]="isLoading" />
                </div>

                @if (errorMessage) {
                <div class="error-message">
                    {{ errorMessage }}
                </div>
                }

                <button type="submit" class="btn-login" [disabled]="isLoading">
                    {{ isLoading ? 'Signing in...' : 'Sign In' }}
                </button>
            </form>
        </div>
    </div>

</div>
