<div class="top-products-container">
    @if (loading) {
    <div class="loading-state">
        <div class="spinner"></div>
    </div>
    } @else if (error) {
    <div class="error-state">{{ error }}</div>
    } @else if (topProducts.length === 0) {
    <div class="empty-state">No products found</div>
    } @else {
    <div class="product-list">
        @for (item of topProducts; track item.product._id) {
        <div class="product-item">
            <img [src]="getProductImage(item.product)"
                (error)="item.product.mainImage = 'assets/placeholder-product.png'" alt="Product" class="product-img">
            <div class="product-info">
                <span class="product-name">{{ item.product.name }}</span>
                <span class="product-id">ID: {{ item.product.sku }}</span>
            </div>
            <div class="sales-count">{{ item.salesCount }} Sales</div>
        </div>
        }
    </div>
    }
</div>
