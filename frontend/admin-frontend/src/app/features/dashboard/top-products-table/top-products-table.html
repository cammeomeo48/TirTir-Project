<div class="top-products-container">
    @if (loading) {
    <div class="loading-state">
        <div class="spinner"></div>
    </div>
    } @else if (error) {
    <div class="error-state">{{ error }}</div>
    } @else if (topProducts.length === 0) {
    <div class="empty-state">No products found</div>
    } @else {
    <div class="product-list">
        @for (item of topProducts; track item.product?._id || $index) {
        <div class="product-item">
            <img [src]="getProductImage(item.product)" alt="Product" class="product-img"
                (error)="$any($event.target).src = 'assets/placeholder-product.png'">
            <div class="product-info">
                <span class="product-name">{{ item.product?.name }}</span>
                <span class="product-id">SKU: {{ item.product?.sku }}</span>
            </div>
            <div class="sales-count">{{ item.salesCount || 0 }} Sales</div>
        </div>
        }
    </div>
    }
</div>
