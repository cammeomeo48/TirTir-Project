<div class="recent-orders-container">
    <div class="orders-header">
        <h3>Recent Orders</h3>
        <p class="subtitle">Latest 10 orders</p>
    </div>

    <div class="orders-content" *ngIf="!loading && !error && recentOrders.length > 0">
        <div class="order-list">
            <div *ngFor="let order of recentOrders" class="order-item">
                <div class="order-info">
                    <div class="order-id">#{{ order.orderNumber }}</div>
                    <div class="customer-name">{{ order.user.name }}</div>
                    <div class="order-time">{{ formatDate(order.createdAt) }}</div>
                </div>
                <div class="order-meta">
                    <div class="order-amount">\${{ order.totalAmount.toFixed(2) }}</div>
                    <span class="status-badge" [ngClass]="getStatusClass(order.status)">
                        {{ order.status }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" *ngIf="!loading && !error && recentOrders.length === 0">
        <p>No recent orders</p>
    </div>

    <div class="loading-state" *ngIf="loading">
        <div class="spinner"></div>
        <p>Loading orders...</p>
    </div>

    <div class="error-state" *ngIf="error">
        <p class="error-message">{{ error }}</p>
    </div>
</div>
