<div class="profile-layout">
    <div class="container">
        <div class="layout-grid">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <div class="sidebar-greeting">
                    <div class="sidebar-greeting-label">Welcome back</div>
                    <div class="sidebar-greeting-name">{{ userName || 'My Account' }}</div>
                </div>
                <nav class="sidebar-nav">
                    @for (item of menuItems; track item.path) {
                    <a [routerLink]="item.path" routerLinkActive="active" #rla="routerLinkActive" class="nav-item">
                        <span class="nav-dot" *ngIf="rla.isActive"></span>
                        <span class="nav-label">{{ item.label }}</span>
                    </a>
                    }
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="content">
                <router-outlet></router-outlet>
            </main>
        </div>
    </div>
</div>
