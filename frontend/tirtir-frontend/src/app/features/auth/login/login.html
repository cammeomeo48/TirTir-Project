<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error Message -->
      <div *ngIf="errorMessage" class="error-alert">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 0C4.48 0 0 4.48 0 10C0 15.52 4.48 20 10 20C15.52 20 20 15.52 20 10C20 4.48 15.52 0 10 0ZM11 15H9V13H11V15ZM11 11H9V5H11V11Z" fill="currentColor"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Email Field -->
      <div class="form-field">
        <label for="email" class="field-label">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="your@email.com"
          class="field-input"
          [class.input-error]="getFieldError('email')"
        />
        <span *ngIf="getFieldError('email')" class="field-error">
          {{ getFieldError('email') }}
        </span>
      </div>

      <!-- Password Field -->
      <div class="form-field">
        <label for="password" class="field-label">Password</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            class="field-input"
            [class.input-error]="getFieldError('password')"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span *ngIf="getFieldError('password')" class="field-error">
          {{ getFieldError('password') }}
        </span>
      </div>

      <!-- Forgot Password Link -->
      <div class="form-options">
        <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-button"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Sign In</span>
        <app-loading-spinner *ngIf="loading"></app-loading-spinner>
      </button>

      <!-- Register Link -->
      <div class="register-prompt">
        <span>Don't have an account?</span>
        <a routerLink="/register" class="register-link">Create Account</a>
      </div>
    </form>
  </div>
</div>
