<div class="home-container">
    <div class="banner">
        <!-- Placeholder for the models image -->
        <img src="..\..\..\assets\images\additional\landingpage\Chat-bot-1.jpg" alt="TIRTIR Models" class="banner-img">
        <div class="overlay-gradient"></div>
        <div class="brand-title">TIRTIR GLOBAL</div>
    </div>

    <div class="welcome-card">
        <div class="brand-header">
            <div class="logo-circle">
                <span>T/R</span>
            </div>
            <div class="brand-text">
                <strong>티르티르 글로벌</strong>
                <p>{{ langService.t('home.greeting') }}</p>
                <p>{{ langService.t('home.question') }}</p>
            </div>
        </div>

        <button class="start-chat-btn" (click)="onStartChat()">
            {{ langService.t('home.startChat') }}
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="powered-by">
        <i class="fas fa-smile"></i> {{ langService.t('home.poweredBy') }}
    </div>
</div>
