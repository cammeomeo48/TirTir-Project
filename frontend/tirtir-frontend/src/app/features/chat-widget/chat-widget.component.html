<div class="chat-widget-container">
    <!-- Main Widget Body -->
    <div class="chat-window" [@toggleChat]="isOpen ? 'open' : 'closed'">

        <!-- Conversation View -->
        <app-chat-conversation *ngIf="showConversation" (back)="backToHome()">
        </app-chat-conversation>

        <!-- Tab Content Views -->
        <div class="tab-content" *ngIf="!showConversation">

            <app-chat-home *ngIf="activeTab === 'home'" (startChat)="startChat()">
            </app-chat-home>

            <app-chat-messages *ngIf="activeTab === 'messages'" (startChat)="startChat()">
            </app-chat-messages>

            <app-chat-settings *ngIf="activeTab === 'settings'"></app-chat-settings>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item" [class.active]="activeTab === 'home'" (click)="setActiveTab('home')">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </button>
                <button class="nav-item" [class.active]="activeTab === 'messages'" (click)="setActiveTab('messages')">
                    <i class="fas fa-comment-alt"></i>
                    <span>Messages</span>
                </button>
                <button class="nav-item" [class.active]="activeTab === 'settings'" (click)="setActiveTab('settings')">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- Launcher Bubble -->
    <button class="chat-launcher" (click)="toggleChat()">
        <div class="icon-container" [@rotateIcon]="isOpen ? 'rotated' : 'default'">
            <i class="fas fa-times" *ngIf="isOpen"></i>
            <i class="fas fa-comment-dots" *ngIf="!isOpen"></i>
        </div>
    </button>
</div>
