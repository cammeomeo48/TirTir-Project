<!-- =====================================================
     SHOP ALL PAGE - TIRTIR Clone
     Reference: https://tirtir.global/collections/shop-all
     ===================================================== -->

<section class="collection-hero" *ngIf="isMakeupCollection">
    <div class="collection-hero-media"></div>
    <div class="container">
        <div class="collection-hero-content">
            <div class="breadcrumbs">
                <a routerLink="/">Home</a>
                <span>/</span>
                <span>Makeup</span>
            </div>
            <h1 class="collection-title">{{ collectionTitle }}</h1>
            <p class="collection-description">{{ collectionDescription }}</p>
        </div>
    </div>
</section>

<!-- Category Banners -->
<section class="category-banners" *ngIf="!isMakeupCollection">
    <div class="banners-grid">
        <a routerLink="/shop" [queryParams]="{category: 'makeup'}" class="banner-card">
            <!-- TODO: Replace with real TIRTIR Makeup banner image -->
            <img src="https://placehold.co/600x300/f5e6e0/000?text=MAKEUP" alt="Makeup">
            <span class="banner-label">MAKEUP</span>
        </a>
        <a routerLink="/shop" [queryParams]="{category: 'skincare'}" class="banner-card">
            <!-- TODO: Replace with real TIRTIR Skincare banner image -->
            <img src="https://placehold.co/600x300/e0e8f5/000?text=SKINCARE" alt="Skincare">
            <span class="banner-label">SKINCARE</span>
        </a>
        <a routerLink="/shop" [queryParams]="{category: 'gift-card'}" class="banner-card">
            <!-- TODO: Replace with real TIRTIR Gift Card banner image -->
            <img src="https://placehold.co/600x300/f0e0f5/000?text=GIFT+CARD" alt="Gift Card">
            <span class="banner-label">GIFT CARD</span>
        </a>
    </div>
</section>

<!-- Filter Controls Bar -->
<section class="filter-bar">
    <div class="container">
        <div class="filter-bar-inner">
            <div class="filter-left">
                <button class="filter-toggle" (click)="toggleFilters()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" y1="21" x2="4" y2="14"></line>
                        <line x1="4" y1="10" x2="4" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="3"></line>
                        <line x1="20" y1="21" x2="20" y2="16"></line>
                        <line x1="20" y1="12" x2="20" y2="3"></line>
                    </svg>
                    {{ showFilters ? 'HIDE FILTERS' : 'SHOW FILTERS' }}
                </button>
                <span class="product-count" *ngIf="isMakeupCollection">{{ displayProducts.length }} PRODUCTS</span>
            </div>

            <div class="sort-control">
                <span class="sort-label">SORT BY:</span>
                <select class="sort-select" [(ngModel)]="sortBy" (ngModelChange)="loadProducts()">
                    <option value="best-selling">Best Selling</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="newest">Newest</option>
                    <option value="top-rated">Top Rated</option>
                    <option value="title-asc">Alphabetically: A-Z</option>
                </select>
            </div>
        </div>
    </div>
</section>

<!-- Main Content -->
<section class="shop-content">
    <div class="container">
        <div class="shop-layout" [class.filters-open]="showFilters">
            <!-- Filter Sidebar -->
            <aside class="filter-sidebar" *ngIf="showFilters">
                <!-- Product Type Filter -->
                <div class="filter-group">
                    <h4 class="filter-title" (click)="toggleFilterGroup('type')">
                        Product type
                        <span class="toggle-icon">{{ expandedFilters['type'] ? '−' : '+' }}</span>
                    </h4>
                    <ul class="filter-options" *ngIf="expandedFilters['type']">
                        <li *ngFor="let type of productTypes">
                            <label class="filter-checkbox">
                                <input type="checkbox" [value]="type.value"
                                    [checked]="selectedCategories.includes(type.value)"
                                    (change)="toggleCategory(type.value)">
                                <span class="checkbox-label">{{ type.label }}</span>
                                <span class="count">({{ type.count || 0 }})</span>
                            </label>
                        </li>
                    </ul>
                </div>

                <!-- Regimens Filter -->
                <div class="filter-group">
                    <h4 class="filter-title" (click)="toggleFilterGroup('regimen')">
                        Regimens
                        <span class="toggle-icon">{{ expandedFilters['regimen'] ? '−' : '+' }}</span>
                    </h4>
                    <ul class="filter-options" *ngIf="expandedFilters['regimen']">
                        <li *ngFor="let regimen of regimens">
                            <label class="filter-checkbox">
                                <input type="checkbox" [value]="regimen.value"
                                    [checked]="selectedRegimens.includes(regimen.value)"
                                    (change)="toggleRegimen(regimen.value)">
                                <span class="checkbox-label">{{ regimen.label }}</span>
                                <span class="count">({{ regimen.count || 0 }})</span>
                            </label>
                        </li>
                    </ul>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="product-grid-container" [class.loading]="isLoading">
                <div class="loading-overlay" *ngIf="isLoading">
                    <div class="spinner"></div>
                </div>

                <div class="products-grid">
                    <app-product-card *ngFor="let product of paginatedProducts; trackBy: trackByProduct"
                        [product]="product"></app-product-card>
                </div>

                <!-- Pagination -->
                <nav class="pagination" *ngIf="!isLoading && displayProducts.length > 0">
                    <button class="page-btn" [disabled]="currentPage === 1" (click)="goToPage(currentPage - 1)">
                        ← Previous
                    </button>
                    <div class="page-numbers">
                        <button *ngFor="let page of pages" class="page-num" [class.active]="page === currentPage"
                            (click)="goToPage(page)">
                            {{ page }}
                        </button>
                    </div>
                    <button class="page-btn" [disabled]="currentPage === totalPages"
                        (click)="goToPage(currentPage + 1)">
                        Next →
                    </button>
                </nav>
            </div>
        </div>
    </div>
</section>
