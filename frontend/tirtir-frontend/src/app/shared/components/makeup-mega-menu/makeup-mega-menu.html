<div class="mega-menu">
    <div class="mega-menu-inner">
        <!-- Face Section -->
        <div class="menu-column">
            <h4 class="column-title">
                <a routerLink="/collections/face">FACE</a>
            </h4>
            <ul class="column-links">
                <li *ngFor="let item of faceItems">
                    <a [routerLink]="item.routerLink">{{ item.label }}</a>
                </li>
            </ul>
        </div>

        <!-- Lip Section -->
        <div class="menu-column">
            <h4 class="column-title">
                <a routerLink="/collections/lips">LIP</a>
            </h4>
            <ul class="column-links">
                <li *ngFor="let item of lipItems">
                    <a [routerLink]="item.routerLink">{{ item.label }}</a>
                </li>
            </ul>
        </div>
    </div>
</div>
