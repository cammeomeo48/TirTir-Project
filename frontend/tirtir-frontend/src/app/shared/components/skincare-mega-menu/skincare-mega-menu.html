<div class="mega-menu">
    <div class="mega-menu-inner">
        <!-- Cleanse & Toner Section -->
        <div class="menu-column">
            <h4 class="column-title">
                <a routerLink="/collections/cleanse-toner">CLEANSE & TONER</a>
            </h4>
            <ul class="column-links">
                <li *ngFor="let item of cleanseTonerItems">
                    <a [routerLink]="item.routerLink">{{ item.label }}</a>
                </li>
            </ul>
        </div>

        <!-- Treatments Section -->
        <div class="menu-column">
            <h4 class="column-title">
                <a routerLink="/collections/treatments">TREATMENTS</a>
            </h4>
            <ul class="column-links">
                <li *ngFor="let item of treatmentsItems">
                    <a [routerLink]="item.routerLink">{{ item.label }}</a>
                </li>
            </ul>
        </div>

        <!-- Moisturize & Sunscreen Section -->
        <div class="menu-column">
            <h4 class="column-title">
                <a routerLink="/collections/moisturize-sunscreen">MOISTURIZE & SUNSCREEN</a>
            </h4>
            <ul class="column-links">
                <li *ngFor="let item of moisturizeSunscreenItems">
                    <a [routerLink]="item.routerLink">{{ item.label }}</a>
                </li>
            </ul>
        </div>
    </div>
</div>
