<header class="site-header">
    <!-- Announcement Bar -->
    <div class="announcement-bar">
        <a routerLink="/deals" class="announcement-link">
            Buy Lip & Blush to get 10% Off Everything *minis excluded
        </a>
    </div>

    <!-- Main Header -->
    <div class="header-main">
        <div class="header-container">
            <!-- Logo (LEFT) -->
            <a routerLink="/" class="logo">
                <span class="logo-text">TIRTIR</span>
            </a>

            <!-- Center Navigation -->
            <nav class="main-nav">
                <ul class="nav-list">
                    <!-- Shop All -->
                    <li class="nav-item">
                        <a routerLink="/shop" class="nav-link">Shop All</a>
                    </li>

                    <!-- Makeup with Mega Menu -->
                    <li class="nav-item has-megamenu" (mouseenter)="onMakeupHover(true)"
                        (mouseleave)="onMakeupHover(false)">
                        <a routerLink="/collections/makeup" class="nav-link">Makeup</a>
                        <app-makeup-mega-menu [class.visible]="showMakeupMenu"
                            [categories]="makeupCategories"></app-makeup-mega-menu>
                    </li>

                    <!-- Skincare with Mega Menu (scoped class nav-skincare) -->
                    <li class="nav-item nav-skincare" (mouseenter)="onSkincareHover(true)"
                        (mouseleave)="onSkincareHover(false)">
                        <a routerLink="/collections/skincare" class="nav-link">Skincare</a>
                        <app-skincare-mega-menu [class.visible]="showSkincareMenu"
                            [categories]="skincareCategories"></app-skincare-mega-menu>
                    </li>

                    <!-- Other items from menuItems (index 3+) -->
                    <li class="nav-item" *ngFor="let item of menuItems.slice(3)">
                        <a [routerLink]="item.routerLink" [queryParams]="item.queryParams || null" class="nav-link">
                            {{ item.label }}
                        </a>
                        <div class="dropdown" *ngIf="item.children?.length">
                            <div class="dropdown-content">
                                <div class="dropdown-column" *ngFor="let column of item.children">
                                    <div class="column-header">
                                        <a [routerLink]="column.routerLink" [queryParams]="column.queryParams || null">
                                            {{ column.label }}
                                        </a>
                                    </div>
                                    <ul class="column-links" *ngIf="column.children?.length">
                                        <li *ngFor="let product of column.children">
                                            <a [routerLink]="product.routerLink"
                                                [queryParams]="product.queryParams || null">
                                                {{ product.label }}
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
            </nav>

            <!-- Header Actions (RIGHT) -->
            <div class="header-actions">
                <a routerLink="/account" class="action-btn" aria-label="Account">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
                <button class="action-btn" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <a routerLink="/cart" class="action-btn cart-btn" aria-label="Cart">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <!-- Show badge only if count > 0 -->
                    <span class="cart-count" *ngIf="cartCount() > 0">{{ cartCount() }}</span>
                </a>
            </div>

            <!-- Mobile Toggle -->
            <button class="mobile-toggle" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>
</header>
