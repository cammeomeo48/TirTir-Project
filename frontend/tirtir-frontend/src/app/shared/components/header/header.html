<div class="announcement-bar">
    <p>TIRTIR’s Viral Glow Favorite.</p>
</div>

<header class="site-header">
    <div class="container">
        <div class="header-wrapper">
            <!-- Logo -->
            <div class="logo">
                <a routerLink="/">TIRTIR</a>
            </div>

            <!-- Navigation -->
            <nav class="main-nav">
                <ul>
                    <li><a routerLink="/shop">Shop All</a></li>
                    <li><a routerLink="/shop" [queryParams]="{category: 'makeup'}">Makeup</a></li>
                    <li><a routerLink="/shop" [queryParams]="{category: 'skincare'}">Skincare</a></li>
                    <li><a href="#">Virtual Services</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>

            <!-- Actions -->
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="Search">
                    <button class="icon-btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                <a href="#" class="icon-btn cart-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </div>
</header>
