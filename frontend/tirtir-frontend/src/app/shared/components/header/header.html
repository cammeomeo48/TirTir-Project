<div class="announcement-bar">
    <p>TIRTIR’s Viral Glow Favorite.</p>
</div>

<header class="site-header">
    <div class="container">
        <div class="header-wrapper">
            <!-- Logo -->
            <div class="logo">
                <a routerLink="/">TIRTIR</a>
            </div>

            <!-- Navigation -->
            <nav class="main-nav">
                <ul>
                    <li *ngFor="let item of menuItems">
                        <a [routerLink]="item.routerLink" [queryParams]="item.queryParams || null">
                            {{ item.label }}
                        </a>
                        <div class="dropdown" *ngIf="item.children?.length">
                            <div class="dropdown-content">
                                <div class="dropdown-column" *ngFor="let column of item.children">
                                    <div class="column-header">
                                        <a [routerLink]="column.routerLink" [queryParams]="column.queryParams || null">
                                            {{ column.label }}
                                        </a>
                                    </div>
                                    <ul class="column-links" *ngIf="column.children?.length">
                                        <li *ngFor="let product of column.children">
                                            <a [routerLink]="product.routerLink"
                                                [queryParams]="product.queryParams || null">
                                                {{ product.label }}
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
            </nav>

            <!-- Actions -->
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="Search">
                    <button class="icon-btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                <a href="#" class="icon-btn cart-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </div>
</header>
