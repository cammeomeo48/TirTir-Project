<div class="carousel-container">
    <button class="nav-btn prev" (click)="scrollLeft()" aria-label="Previous">
        <i class="fa-solid fa-chevron-left"></i>
    </button>
    
    <div class="carousel-track" #carouselTrack>
        <div class="carousel-item" *ngFor="let product of products">
            <app-product-card [product]="product"></app-product-card>
        </div>
    </div>

    <button class="nav-btn next" (click)="scrollRight()" aria-label="Next">
        <i class="fa-solid fa-chevron-right"></i>
    </button>
</div>
