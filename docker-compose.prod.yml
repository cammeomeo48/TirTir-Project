# ─── TirTir Production Docker Compose ─────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from dev (docker-compose.yml):
#   - No hot-reload volumes
#   - Resource limits
#   - Production environment
#   - Frontend built with Nginx
#   - Restart always
# ──────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:
  # ─── Redis Cache ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FastAPI AI Microservice ─────────────────────────────
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY}
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── FastAPI Chatbot Microservice ────────────────────────
  chatbot:
    build: ./backend/chatbot
    ports:
      - "8001:8001"
    environment:
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY}
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Node.js Backend ────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8000
      - CHATBOT_SERVICE_URL=http://chatbot:8001
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY}
    depends_on:
      ai-service:
        condition: service_healthy
      chatbot:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:5001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend (Nginx) ──────────────────────────────────
  frontend:
    build: ./frontend/tirtir-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
